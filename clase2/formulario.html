<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML: CV FORMULARIO</title>
</head>
<h1>Formulario de Contacto</h1>
<body>
    <form action=""></form>
    <p>
        <label for="Nombre">Nombre:</label>
        <input type="text" name="Nombre" id="Nombre" placeholder="Ingrese su nombre">
       
    </p>
    <p>
         <label for="Apellido">Apellido:</label>
        <input type="text" name="Apellido" id="Apellido" placeholder="Ingrese su apellido">

    </p>
    <p>
        <label for="Email">Email:</label>
        <input type="email" name="Email" id="Email" placeholder="Ingrese su email">
    </p>
   
    <p>
        <label for="Domicilio">Domicilio:</label>
        <input type="text" name="Domicilio" id="Domicilio" placeholder="Ingrese su domicilio">
    </p>
 <p>
        <label for="sexo">Sexo:</label>
        <select name="sexo" id="sexo">
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            <option value="otro">Otro</option>
        </select>
    </p>
    <p>
        <label for="Motivo de contacto">Motivo de contacto:</label>
        <textarea name="Motivo de contacto" id="Motivo de contacto" placeholder="Ingrese su motivo de contacto"></textarea>
    </p>
     <p>

     </p>
    <p>
        <input type="submit" value="Enviar">
    </p>
</body>
</html>
